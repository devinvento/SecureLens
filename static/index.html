<!doctype html>
<html lang="en" data-layout="twocolumn" data-sidebar="light" data-sidebar-size="lg" data-sidebar-image="none">

<head>

    <meta charset="utf-8" />
    <title>Sign In | SecureLens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="SecureLens - Vulnerability Scanner" name="description" />
    <meta content="SecureLens" name="author" />
    
    <!-- App favicon -->
    <link rel="shortcut icon" href="/static/assets/images/favicon.ico">

    <!-- Layout config Js -->
    <script src="/static/assets/js/layout.js"></script>
    <!-- Bootstrap Css -->
    <link href="/static/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <!-- Icons Css -->
    <link href="/static/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <!-- App Css-->
    <link href="/static/assets/css/app.min.css" rel="stylesheet" type="text/css" />
    <!-- custom Css-->
    <link href="/static/assets/css/custom.min.css" rel="stylesheet" type="text/css" />

    <!-- SweetAlert2 -->
    <script src="/static/assets/libs/sweetalert2/sweetalert2.all.min.js"></script>


</head>

<body>

    <div class="auth-page-wrapper pt-5">
        <!-- auth page bg -->
        <div class="auth-one-bg-position auth-one-bg" id="auth-particles">
            <div class="bg-overlay"></div>

            <div class="shape">
                <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 120">
                    <path d="M 0,36 C 144,53.6 432,123.2 720,124 C 1008,124.8 1296,56.8 1440,40L1440 140L0 140z"></path>
                </svg>
            </div>
        </div>

        <!-- auth page content -->
        <div class="auth-page-content">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="text-center mt-sm-5 mb-4 text-white-50">
                            <div>
                                <a href="index.html" class="d-inline-block auth-logo">
                                    <img src="/static/assets/images/logo-light.png" alt="" height="20">
                                </a>
                            </div>
                            <p class="mt-3 fs-15 fw-semibold">Vulnerability Scanner & Security Assessment Platform </p>
                        </div>
                    </div>
                </div>
                <!-- end row -->

                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6 col-xl-5">
                        <div class="card mt-4">

                            <div class="card-body p-4">
                                <div class="text-center mt-2">
                                    <h5 class="text-primary">Welcome Back !</h5>
                                    <p class="text-muted">Sign in to continue to SecureLens.</p>
                                </div>
                                <div class="p-2 mt-4">
                                    <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
                                    
                                    <form id="loginForm">

                                        <div class="mb-3">
                                            <label for="email" class="form-label">Email Address</label>
                                            <input type="email" class="form-control" id="email" placeholder="Enter email" value="admin@securelens.local" required>
                                        </div>

                                        <div class="mb-3">
                                            <div class="float-end">
                                                <a href="#" class="text-muted">Forgot password?</a>
                                            </div>
                                            <label class="form-label" for="password-input">Password</label>
                                            <div class="position-relative auth-pass-inputgroup mb-3">
                                                <input type="password" class="form-control pe-5" placeholder="Enter password" id="password" value="admin123" required>
                                                <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="password-addon"><i class="ri-eye-fill align-middle"></i></button>
                                            </div>
                                        </div>

                                        <div id="2fa-section" class="d-none mb-3">
                                            <label for="2fa-code" class="form-label text-primary fw-bold"><i class="ri-shield-keyhole-line align-middle me-1"></i> Two-Factor Authentication</label>
                                            <input type="text" class="form-control" id="2fa-code" placeholder="Enter 6-digit code">
                                            <p class="text-muted fs-12 mt-1">Please enter the code from your authenticator app.</p>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" value="" id="auth-remember-check">
                                            <label class="form-check-label" for="auth-remember-check">Remember me</label>
                                        </div>

                                        <div class="mt-4">
                                            <button class="btn btn-success w-100" type="submit">Sign In</button>
                                        </div>

                                        <div class="mt-4 text-center">
                                            <div class="signin-other-title">
                                                <h5 class="fs-13 mb-4 title">Sign In with</h5>
                                            </div>
                                            <div>
                                                <button type="button" class="btn btn-primary btn-icon waves-effect waves-light"><i class="ri-facebook-fill fs-16"></i></button>
                                                <button type="button" class="btn btn-danger btn-icon waves-effect waves-light"><i class="ri-google-fill fs-16"></i></button>
                                                <button type="button" class="btn btn-dark btn-icon waves-effect waves-light"><i class="ri-github-fill fs-16"></i></button>
                                                <button type="button" class="btn btn-info btn-icon waves-effect waves-light"><i class="ri-twitter-fill fs-16"></i></button>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                            <!-- end card body -->
                        </div>
                        <!-- end card -->

                        <div class="mt-4 text-center">
                            <p class="mb-0">Don't have an account ? <a href="auth-signup-basic.html" class="fw-bold text-primary text-decoration-underline"> Signup </a> </p>
                        </div>

                    </div>
                </div>
                <!-- end row -->
            </div>
            <!-- end container -->
        </div>
        <!-- end auth page content -->

        <!-- footer -->
        <footer class="footer">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="text-center">
                            <p class="mb-0 text-muted">&copy;
                                <script>document.write(new Date().getFullYear())</script> SecureLens. Crafted with <i class="mdi mdi-heart text-danger"></i>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
        <!-- end Footer -->
    </div>
    <!-- end auth-page-wrapper -->

    <script src="/static/assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/assets/libs/simplebar/simplebar.min.js"></script>
    <script src="/static/assets/libs/node-waves/waves.min.js"></script>
    <script src="/static/assets/libs/feather-icons/feather.min.js"></script>
    <script src="/static/assets/js/pages/plugins/lord-icon-2.1.0.js"></script>
    <script src="/static/assets/libs/particles.js/particles.js"></script>

    <!-- JAVASCRIPT -->
    <!-- particles app js -->
    <script src="static/assets/js/pages/particles.app.js"></script>
    <!-- password-addon init -->
    <script src="static/assets/js/pages/password-addon.init.js"></script>
    
    <!-- Loader & App JS -->
    <script src="static/js/loader.js"></script>
    <script src="static/js/app.js"></script>
    
    <script>
        // Show password for 5 seconds
        document.getElementById("password-addon").addEventListener("click", function () {
            const passwordInput = document.getElementById("password");
            const icon = this.querySelector("i");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.replace("ri-eye-fill", "ri-eye-off-fill");
                
                setTimeout(() => {
                    passwordInput.type = "password";
                    icon.classList.replace("ri-eye-off-fill", "ri-eye-fill");
                }, 5000);
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const totpCode = document.getElementById("2fa-code").value;

            // If 2FA section is visible, verify 2FA
            if (!document.getElementById("2fa-section").classList.contains("d-none")) {
                const res = await verify2FA(email, totpCode);
                if (res.token) {
                    window.location.href = "/dashboard.html";
                } else {
                    const alert = document.getElementById("loginAlert");
                    alert.textContent = res.error;
                    alert.classList.remove("d-none");
                }
                return;
            }

            const res = await loginUser(email, password);
            if(res.token) {
                window.location.href = "/dashboard.html";
            } else if (res.status === "2FA_REQUIRED") {
                document.getElementById("2fa-section").classList.remove("d-none");
                document.getElementById("2fa-code").focus();
                document.getElementById("2fa-code").required = true;
                // Move Sign In button focus or update text
                const btn = e.target.querySelector('button[type="submit"]');
                btn.textContent = "Verify & Sign In";
            } else {
                const alert = document.getElementById("loginAlert");
                alert.textContent = res.error;
                alert.classList.remove("d-none");
            }
        });
    </script>
</body>

</html>
