<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentPage = document.body.getAttribute('data-page') || 'dashboard';
    
    // Map page IDs to their corresponding menu links
    const pageMap = {
        'dashboard': '/dashboard.html',
        'scans': '/scans.html',
        'lab': '/lab.html',
        'scanning': '/tools/scanning.html',
        'enumeration': '/tools/enumeration.html',
        'information-gathering': '/tools/information-gathering.html',
        'web-fuzzing': '/tools/web-fuzzing.html',
        'vulnerability-assessment': '/tools/vulnerability-assessment.html',
        'db_playground': '/db_playground.html',
        'users': '/users.html',
        'roles': '/roles.html',
        'permissions': '/permissions.html',
        'profile': '/profile.html'
    };
    
    const targetHref = pageMap[currentPage];
    if (targetHref) {
        // Find the nav-link that matches the current page
        document.querySelectorAll('.navbar-nav .nav-link').forEach(function(link) {
            if (link.getAttribute('href') === targetHref) {
                link.classList.add('active');
                // If parent menu dropdown, also highlight parent
                const parentCollapse = link.closest('.collapse');
                if (parentCollapse) {
                    const parentLink = document.querySelector(`[href="#${parentCollapse.id}"]`);
                    if (parentLink) {
                        parentLink.classList.add('active');
                        parentCollapse.classList.add('show');
                    }
                }
            }
        });
    }
});
</script>
