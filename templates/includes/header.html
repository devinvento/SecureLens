                <button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger" id="topnav-hamburger-icon">

                                            <i class="ri-alert-line"></i>
                                        </span>
                                    </div>
                                    <div class="flex-1">
                                        <p class="mb-0 fw-semibold">Vulnerability Found</p>
                                        <p class="mb-0 text-muted">Critical vulnerability detected</p>
                                    </div>
                                </div>
                            </a>
                            <a href="javascript:void(0);" class="dropdown-item notify-item">

                                    <div class="avatar-xs me-3">
                                        <span class="avatar-title bg-soft-success text-success rounded-circle fs-16">
                                            <i class="ri-checkbox-circle-line"></i>
                                        </span>

                                    <div class="flex-1">
                                        <p class="mb-0 fw-semibold">Target Added</p>

                                    </div>
                                </div>
                            </a>

                        <a class="dropdown-item" href="#"><i class="mdi mdi-cog text-muted fs-16 align-middle me-1"></i> <span class="align-middle">Settings</span></a>
