<header id="page-topbar">

        <div class="navbar-header">
            <div class="d-flex">

                    <a href="/dashboard.html" class="logo logo-light">
                        <span class="logo-sm">
                            <img src="/static/assets/images/logo-sm.png" alt="" height="22">
                        </span>
                        <span class="logo-lg">

                <button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger" id="topnav-hamburger-icon">

                        <span></span>
                        <span></span>

                <!-- App Search - Global Target Input -->
                <form class="app-search d-none d-md-block" onsubmit="return false;">
                    <div class="position-relative">
                        <input type="text" class="form-control" style="width: 500px;" placeholder="Set target (e.g., google.com)..." autocomplete="off" id="globalTargetInput" value="" onkeypress="if(event.key === 'Enter') { event.preventDefault(); resolveAndSetTarget(); }">
                        <span class="mdi mdi-magnify search-widget-icon"></span>
                        <button class="btn btn-sm btn-primary position-absolute end-0 top-0 h-100" type="button" onclick="resolveAndSetTarget()" style="border-radius: 0 0.2rem 0.2rem 0;">
                            <i class="ri-save-line"></i>
                        </button>
                    </div>
                </form>

                <script>
                async function resolveAndSetTarget() {
                    const input = document.getElementById('globalTargetInput');
                    const target = input?.value?.trim();
                    const btn = input?.parentElement?.querySelector('button');
                    
                    if (!target) return;

                    if (btn) {
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
                    }

                    try {
                        const token = localStorage.getItem('access_token');
                        const res = await fetch(`/api/tools/lookup/${encodeURIComponent(target)}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const data = await res.json();
                        
                        if (data.status === 'success' && data.ip) {
                            sessionStorage.setItem('recon_target', data.ip);
                            sessionStorage.setItem('recon_domain', data.domain || target);
                            sessionStorage.setItem('recon_resolved_ip', data.ip);
                            
                            // Show success
                            if (typeof Swal !== 'undefined') {
                                Swal.fire({ icon: "success", title: "Target Set!", text: `${data.domain} resolved to ${data.ip}`, timer: 2000, showConfirmButton: false });
                            }
                            
                            // Notify other pages if on tools page
                            window.dispatchEvent(new CustomEvent('targetResolved', { detail: { target: data.ip, domain: data.domain } }));
                        } else {
                            // Check if it's already an IP
                            if (/^(\d{1,3}\.){3}\d{1,3}$/.test(target)) {
                                sessionStorage.setItem('recon_target', target);
                                sessionStorage.setItem('recon_domain', '');
                                window.dispatchEvent(new CustomEvent('targetResolved', { detail: { target: target, domain: '' } }));
                            } else if (typeof Swal !== 'undefined') {
                                Swal.fire({ icon: "error", title: "Resolution Failed", text: data.message || "Could not resolve target.", timer: 2000, showConfirmButton: false });
                            }
                        }
                    } catch (err) {
                        console.error(err);
                        // Fallback: save as-is
                        sessionStorage.setItem('recon_target', target);
                        window.dispatchEvent(new CustomEvent('targetResolved', { detail: { target: target, domain: '' } }));
                    } finally {
                        if (btn) {
                            btn.disabled = false;
                            btn.innerHTML = '<i class="ri-save-line"></i>';
                        }
                    }
                }

                // Save target to session storage and auto-fill all tool inputs
                function saveTarget() {
                    const target = document.getElementById("globalTargetInput")?.value?.trim();
                    
                    if (!target) {
                        if (typeof Swal !== 'undefined') {
                            Swal.fire({ icon: "warning", title: "Input Required", text: "Please enter a domain or IP address.", timer: 2000, showConfirmButton: false });
                        }
                        return;
                    }

                    // Determine if target is IP or domain
                    const isIP = /^(\d{1,3}\.){3}\d{1,3}$/.test(target);
                    
                    // Save to session storage
                    sessionStorage.setItem('recon_target', isIP ? target : '');
                    sessionStorage.setItem('recon_domain', isIP ? '' : target);
                    
                    // Auto-fill all target inputs based on prefer_target attribute
                    const inputs = document.querySelectorAll('.target-input');
                    inputs.forEach(input => {
                        const preferTarget = input.getAttribute('prefer_target') || 'domain';
                        if (preferTarget === 'ip') {
                            input.value = isIP ? target : ''; // Use IP if available
                        } else {
                            input.value = isIP ? '' : target; // Use domain if available
                        }
                        input.classList.add('is-valid');
                        setTimeout(() => input.classList.remove('is-valid'), 2000);
                    });

                    if (typeof Swal !== 'undefined') {
                        Swal.fire({ icon: "success", title: "Target Set!", text: `${target} will be used for all tools.`, timer: 2000, showConfirmButton: false });
                    }
                }

                // Clear target from session storage
                function clearTarget() {
                    sessionStorage.removeItem('recon_target');
                    sessionStorage.removeItem('recon_domain');
                    sessionStorage.removeItem('recon_resolved_ip');
                    
                    // Clear all target inputs
                    const inputs = document.querySelectorAll('.target-input');
                    inputs.forEach(input => {
                        input.value = '';
                    });

                    // Clear header input
                    const headerInput = document.getElementById('globalTargetInput');
                    if (headerInput) headerInput.value = '';

                    if (typeof Swal !== 'undefined') {
                        Swal.fire({ icon: "info", title: "Target Cleared", text: "All tool targets have been cleared.", timer: 2000, showConfirmButton: false });
                    }
                }
                </script>
