services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-securelens_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U securelens" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - securelens_network

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - securelens_network

  web:
    build: .
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 4567 --reload --reload-dir /app --log-level debug
    ports:
      - "4567:4567"
    environment:
      - DATABASE_URL=postgresql://securelens:securepassword@db:5432/securelens_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=a_very_secret_key_change_in_production
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - securelens_network
    cap_add:
      - NET_RAW
      - NET_ADMIN

  worker:
    build: .
    working_dir: /app
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://securelens:securepassword@db:5432/securelens_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: always
    networks:
      - securelens_network
    cap_add:
      - NET_RAW
      - NET_ADMIN

volumes:
  postgres_data:


networks:
  securelens_network:
    driver: bridge
